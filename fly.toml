# fly.toml app configuration file generated for loopwise on 2026-04-14T13:16:34Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
app = 'loopwise'
primary_region = 'ams'

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
